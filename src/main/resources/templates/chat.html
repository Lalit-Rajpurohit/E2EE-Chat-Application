<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E2EE Chat</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: #f0f2f5;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            color: #1a1a1a;
        }
        .app-container { display: flex; height: 100vh; }

        /* Sidebar */
        .sidebar {
            width: 300px;
            background: #fff;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #e5e7eb;
        }
        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid #e5e7eb;
        }
        .sidebar-header h4 {
            margin: 0;
            font-weight: 700;
            color: #4f46e5;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .e2ee-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            background: #ecfdf5;
            color: #059669;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
        }
        .user-badge {
            background: #f3f4f6;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.85rem;
            color: #6b7280;
            display: flex;
            align-items: center;
            gap: 6px;
            margin-top: 12px;
        }
        .users-section { padding: 15px; flex: 1; overflow-y: auto; }
        .section-title {
            font-size: 0.75rem;
            text-transform: uppercase;
            color: #9ca3af;
            margin-bottom: 12px;
            letter-spacing: 0.5px;
            font-weight: 600;
        }
        .user-item {
            padding: 12px 14px;
            border-radius: 10px;
            cursor: pointer;
            margin-bottom: 4px;
            transition: all 0.15s;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .user-item:hover { background: #f3f4f6; }
        .user-item.active { background: #4f46e5; color: #fff; }
        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
        }
        .user-item.active .user-avatar { background: rgba(255,255,255,0.25); }
        .user-name { font-weight: 500; }
        .logout-btn {
            margin: 15px;
            padding: 12px;
            background: #fff;
            border: 1px solid #e5e7eb;
            color: #6b7280;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.15s;
            font-weight: 500;
        }
        .logout-btn:hover { background: #fee2e2; border-color: #fecaca; color: #dc2626; }

        /* Chat Area */
        .chat-area { flex: 1; display: flex; flex-direction: column; background: #f8fafc; }
        .chat-header {
            padding: 18px 25px;
            border-bottom: 1px solid #e5e7eb;
            background: #fff;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .chat-header h5 { margin: 0; font-weight: 600; color: #1f2937; }
        .encryption-status {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.8rem;
            color: #059669;
        }
        .encryption-status svg { width: 16px; height: 16px; }
        .messages-area { flex: 1; overflow-y: auto; padding: 25px; }
        .no-chat-selected {
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #9ca3af;
        }
        .no-chat-selected svg { width: 80px; height: 80px; margin-bottom: 16px; color: #d1d5db; }
        .message-row { display: flex; margin-bottom: 12px; }
        .message-row.sent { justify-content: flex-end; }
        .message-bubble {
            max-width: 60%;
            padding: 12px 16px;
            border-radius: 18px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }
        .message-row.sent .message-bubble {
            background: #4f46e5;
            color: #fff;
            border-bottom-right-radius: 6px;
        }
        .message-row.received .message-bubble {
            background: #fff;
            color: #1f2937;
            border-bottom-left-radius: 6px;
            border: 1px solid #e5e7eb;
        }
        .message-text { margin: 0; line-height: 1.5; word-wrap: break-word; }
        .message-meta {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-top: 6px;
            font-size: 0.7rem;
            opacity: 0.7;
            justify-content: flex-end;
        }
        .message-meta svg { width: 12px; height: 12px; }

        /* Input Area */
        .input-area { padding: 18px 25px; border-top: 1px solid #e5e7eb; background: #fff; }
        .input-wrapper { display: flex; gap: 12px; }
        .input-wrapper input {
            flex: 1;
            padding: 14px 20px;
            border: 1px solid #e5e7eb;
            border-radius: 25px;
            background: #f9fafb;
            color: #1f2937;
            font-size: 0.95rem;
            outline: none;
            transition: all 0.15s;
        }
        .input-wrapper input::placeholder { color: #9ca3af; }
        .input-wrapper input:focus {
            border-color: #4f46e5;
            background: #fff;
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }
        .send-btn {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: none;
            background: #4f46e5;
            color: #fff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s;
        }
        .send-btn:hover { background: #4338ca; transform: scale(1.05); }
        .send-btn svg { width: 20px; height: 20px; }

        .status-dot { width: 8px; height: 8px; border-radius: 50%; }
        .status-dot.connected { background: #10b981; }
        .status-dot.disconnected { background: #ef4444; }

        .decrypting { opacity: 0.6; font-style: italic; }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="sidebar">
            <div class="sidebar-header">
                <h4>
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                    </svg>
                    E2EE Chat
                </h4>
                <div class="user-badge">
                    <span class="status-dot disconnected" id="statusDot"></span>
                    <span id="currentUser"></span>
                    <span class="e2ee-badge">
                        <svg xmlns="http://www.w3.org/2000/svg" width="10" height="10" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" />
                        </svg>
                        Encrypted
                    </span>
                </div>
            </div>
            <div class="users-section">
                <div class="section-title">Contacts</div>
                <div id="usersList"></div>
            </div>
            <button class="logout-btn" onclick="logout()">Sign Out</button>
        </div>

        <div class="chat-area">
            <div id="noChatSelected" class="no-chat-selected">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                </svg>
                <p>Select a contact to start encrypted chat</p>
                <small style="color: #9ca3af; margin-top: 8px;">Messages are end-to-end encrypted</small>
            </div>

            <div id="chatContent" style="display: none; flex-direction: column; height: 100%;">
                <div class="chat-header">
                    <div>
                        <h5 id="chatWithName"></h5>
                    </div>
                    <div class="encryption-status">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                        </svg>
                        End-to-End Encrypted
                    </div>
                </div>
                <div class="messages-area" id="messages"></div>
                <div class="input-area">
                    <div class="input-wrapper">
                        <input type="text" id="messageInput" placeholder="Type an encrypted message..." autocomplete="off">
                        <button class="send-btn" onclick="sendMessage()">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" />
                            </svg>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
    /**
     * =====================================================================
     * E2EE CLIENT-SIDE ENCRYPTION/DECRYPTION
     * =====================================================================
     *
     * SECURITY DESIGN:
     * - All encryption/decryption happens in the browser
     * - Private key never leaves localStorage
     * - Server only sees encrypted data
     *
     * ENCRYPTION FLOW (sending):
     * 1. Generate random AES-256 session key
     * 2. Encrypt message with AES-GCM
     * 3. Fetch recipient's RSA public key
     * 4. Encrypt AES key with RSA-OAEP
     * 5. Send encrypted payload to server
     *
     * DECRYPTION FLOW (receiving):
     * 1. Receive encrypted message + encrypted AES key
     * 2. Decrypt AES key with own RSA private key
     * 3. Decrypt message with AES key
     * 4. Display plaintext
     * =====================================================================
     */

    let stompClient = null;
    let currentUser = null;
    let selectedUser = null;
    let token = null;
    let isConnected = false;
    let privateKey = null;  // RSA private key (from localStorage)
    let myPublicKey = null;  // Own public key for encrypting sent messages
    let publicKeysCache = {};  // Cache recipient public keys

    // =====================================================================
    // CRYPTO UTILITIES
    // =====================================================================

    function arrayBufferToBase64(buffer) {
        const bytes = new Uint8Array(buffer);
        let binary = '';
        for (let i = 0; i < bytes.length; i++) {
            binary += String.fromCharCode(bytes[i]);
        }
        return window.btoa(binary);
    }

    function base64ToArrayBuffer(base64) {
        const binary = window.atob(base64);
        const bytes = new Uint8Array(binary.length);
        for (let i = 0; i < binary.length; i++) {
            bytes[i] = binary.charCodeAt(i);
        }
        return bytes.buffer;
    }

    // Import RSA private key from Base64 (PKCS8)
    async function importPrivateKey(base64Key) {
        const keyData = base64ToArrayBuffer(base64Key);
        return await window.crypto.subtle.importKey(
            "pkcs8",
            keyData,
            { name: "RSA-OAEP", hash: "SHA-256" },
            false,
            ["decrypt"]
        );
    }

    // Import RSA public key from Base64 (SPKI)
    async function importPublicKey(base64Key) {
        const keyData = base64ToArrayBuffer(base64Key);
        return await window.crypto.subtle.importKey(
            "spki",
            keyData,
            { name: "RSA-OAEP", hash: "SHA-256" },
            false,
            ["encrypt"]
        );
    }

    // Generate random AES-256 key
    async function generateAESKey() {
        return await window.crypto.subtle.generateKey(
            { name: "AES-GCM", length: 256 },
            true,
            ["encrypt", "decrypt"]
        );
    }

    // Encrypt message with AES-GCM
    async function encryptWithAES(plaintext, aesKey) {
        const iv = window.crypto.getRandomValues(new Uint8Array(12));
        const encodedText = new TextEncoder().encode(plaintext);

        const ciphertext = await window.crypto.subtle.encrypt(
            { name: "AES-GCM", iv: iv },
            aesKey,
            encodedText
        );

        // Combine IV + ciphertext
        const combined = new Uint8Array(iv.length + ciphertext.byteLength);
        combined.set(iv, 0);
        combined.set(new Uint8Array(ciphertext), iv.length);

        return arrayBufferToBase64(combined.buffer);
    }

    // Decrypt message with AES-GCM
    async function decryptWithAES(encryptedBase64, aesKey) {
        const combined = new Uint8Array(base64ToArrayBuffer(encryptedBase64));

        const iv = combined.slice(0, 12);
        const ciphertext = combined.slice(12);

        const plaintext = await window.crypto.subtle.decrypt(
            { name: "AES-GCM", iv: iv },
            aesKey,
            ciphertext
        );

        return new TextDecoder().decode(plaintext);
    }

    // Encrypt AES key with RSA public key
    async function encryptAESKey(aesKey, rsaPublicKey) {
        const rawKey = await window.crypto.subtle.exportKey("raw", aesKey);
        const encrypted = await window.crypto.subtle.encrypt(
            { name: "RSA-OAEP" },
            rsaPublicKey,
            rawKey
        );
        return arrayBufferToBase64(encrypted);
    }

    // Decrypt AES key with RSA private key
    async function decryptAESKey(encryptedKeyBase64, rsaPrivateKey) {
        const encryptedKey = base64ToArrayBuffer(encryptedKeyBase64);
        const rawKey = await window.crypto.subtle.decrypt(
            { name: "RSA-OAEP" },
            rsaPrivateKey,
            encryptedKey
        );
        return await window.crypto.subtle.importKey(
            "raw",
            rawKey,
            { name: "AES-GCM" },
            false,
            ["decrypt"]
        );
    }

    // Fetch and cache recipient's public key
    async function getRecipientPublicKey(username) {
        if (publicKeysCache[username]) {
            return publicKeysCache[username];
        }

        const response = await fetch(`/api/auth/users/${username}/public-key`, {
            headers: { 'Authorization': 'Bearer ' + token }
        });

        if (!response.ok) throw new Error('Failed to fetch public key');

        const data = await response.json();
        const publicKey = await importPublicKey(data.publicKey);
        publicKeysCache[username] = publicKey;
        return publicKey;
    }

    // =====================================================================
    // MESSAGE ENCRYPTION (SENDING)
    // =====================================================================

    async function encryptMessage(plaintext, recipientUsername) {
        // 1. Generate random AES session key
        const aesKey = await generateAESKey();

        // 2. Encrypt message with AES
        const encryptedMessage = await encryptWithAES(plaintext, aesKey);

        // 3. Get recipient's public key
        const recipientPublicKey = await getRecipientPublicKey(recipientUsername);

        // 4. Encrypt AES key with recipient's RSA public key
        const encryptedKey = await encryptAESKey(aesKey, recipientPublicKey);

        // 5. ALSO encrypt AES key with sender's own public key
        //    This allows sender to decrypt their own sent messages
        const encryptedKeySender = await encryptAESKey(aesKey, myPublicKey);

        return { encryptedMessage, encryptedKey, encryptedKeySender };
    }

    // =====================================================================
    // MESSAGE DECRYPTION (RECEIVING)
    // =====================================================================

    async function decryptMessage(encryptedContent, encryptedKey, encryptedKeySender, senderUsername) {
        try {
            // Use the appropriate encrypted key based on who we are
            // If we're the sender AND we have encryptedKeySender, use it
            // Otherwise use encryptedKey (for recipient or old messages)
            let keyToUse = encryptedKey;

            if (senderUsername === currentUser && encryptedKeySender) {
                keyToUse = encryptedKeySender;
            }

            // 1. Decrypt AES key using our private key
            const aesKey = await decryptAESKey(keyToUse, privateKey);

            // 2. Decrypt message using AES key
            const plaintext = await decryptWithAES(encryptedContent, aesKey);

            return plaintext;
        } catch (error) {
            console.error('Decryption failed:', error);
            return '[Unable to decrypt message]';
        }
    }

    // =====================================================================
    // APPLICATION LOGIC
    // =====================================================================

    async function checkAuth() {
        token = localStorage.getItem('token');
        currentUser = localStorage.getItem('username');
        const privateKeyBase64 = localStorage.getItem('privateKey');
        const publicKeyBase64 = localStorage.getItem('publicKey');

        if (!token || !currentUser || !privateKeyBase64 || !publicKeyBase64) {
            window.location.href = '/login';
            return false;
        }

        // Import private key for decryption
        try {
            privateKey = await importPrivateKey(privateKeyBase64);
            myPublicKey = await importPublicKey(publicKeyBase64);
            console.log('Keys loaded successfully');
        } catch (error) {
            console.error('Failed to load keys:', error);
            window.location.href = '/login';
            return false;
        }

        document.getElementById('currentUser').textContent = currentUser;
        return true;
    }

    function updateConnectionStatus(connected) {
        isConnected = connected;
        const dot = document.getElementById('statusDot');
        dot.className = 'status-dot ' + (connected ? 'connected' : 'disconnected');
    }

    function connect() {
        const socket = new SockJS('/ws');
        stompClient = Stomp.over(socket);
        stompClient.debug = null;

        stompClient.connect({}, function(frame) {
            console.log('WebSocket connected');
            updateConnectionStatus(true);

            stompClient.subscribe('/topic/messages/' + currentUser, async function(message) {
                const encryptedMessage = JSON.parse(message.body);
                await handleIncomingMessage(encryptedMessage);
            });

            loadUsers();
        }, function(error) {
            console.error('Connection error:', error);
            updateConnectionStatus(false);
            setTimeout(connect, 3000);
        });
    }

    async function handleIncomingMessage(message) {
        const isCurrentConversation =
            (message.sender === selectedUser) ||
            (message.sender === currentUser && message.recipient === selectedUser);

        if (isCurrentConversation) {
            await appendMessage(message);
        }
    }

    async function loadUsers() {
        try {
            const response = await fetch('/api/auth/users', {
                headers: { 'Authorization': 'Bearer ' + token }
            });

            if (response.ok) {
                const users = await response.json();
                displayUsers(users);
            }
        } catch (error) {
            console.error('Error loading users:', error);
        }
    }

    function displayUsers(users) {
        const usersList = document.getElementById('usersList');
        usersList.innerHTML = '';

        if (users.length === 0) {
            usersList.innerHTML = '<p style="color: #9ca3af; padding: 10px;">No other users yet</p>';
            return;
        }

        users.forEach(username => {
            const div = document.createElement('div');
            div.className = 'user-item';
            div.innerHTML = `
                <div class="user-avatar">${username.charAt(0).toUpperCase()}</div>
                <span class="user-name">${username}</span>
            `;
            div.onclick = () => selectUser(username);
            usersList.appendChild(div);
        });
    }

    async function selectUser(username) {
        selectedUser = username;

        document.querySelectorAll('.user-item').forEach(item => {
            item.classList.remove('active');
            if (item.querySelector('.user-name').textContent === username) {
                item.classList.add('active');
            }
        });

        document.getElementById('noChatSelected').style.display = 'none';
        document.getElementById('chatContent').style.display = 'flex';
        document.getElementById('chatWithName').textContent = username;
        document.getElementById('messages').innerHTML = '';

        // Pre-fetch recipient's public key
        try {
            await getRecipientPublicKey(username);
        } catch (error) {
            console.error('Failed to fetch public key:', error);
        }

        await loadConversation(username);
        document.getElementById('messageInput').focus();
    }

    async function loadConversation(withUser) {
        try {
            const response = await fetch('/api/messages?withUser=' + encodeURIComponent(withUser), {
                headers: { 'Authorization': 'Bearer ' + token }
            });

            if (response.ok) {
                const messages = await response.json();
                const messagesDiv = document.getElementById('messages');
                messagesDiv.innerHTML = '';

                for (const msg of messages) {
                    await appendMessage(msg, false);
                }
                messagesDiv.scrollTop = messagesDiv.scrollHeight;
            }
        } catch (error) {
            console.error('Error loading conversation:', error);
        }
    }

    async function appendMessage(message, scroll = true) {
        const messagesDiv = document.getElementById('messages');
        const isSent = message.sender === currentUser;

        const row = document.createElement('div');
        row.className = 'message-row ' + (isSent ? 'sent' : 'received');

        const bubble = document.createElement('div');
        bubble.className = 'message-bubble';

        const text = document.createElement('p');
        text.className = 'message-text decrypting';
        text.textContent = 'Decrypting...';
        bubble.appendChild(text);

        row.appendChild(bubble);
        messagesDiv.appendChild(row);

        // Decrypt the message
        try {
            const plaintext = await decryptMessage(
                message.encryptedContent,
                message.encryptedKey,
                message.encryptedKeySender,
                message.sender
            );
            text.textContent = plaintext;
            text.classList.remove('decrypting');
        } catch (error) {
            text.textContent = '[Decryption failed]';
            text.classList.remove('decrypting');
        }

        // Add metadata
        const meta = document.createElement('div');
        meta.className = 'message-meta';
        meta.innerHTML = `
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
            </svg>
            ${message.timestamp ? new Date(message.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) : 'Now'}
        `;
        bubble.appendChild(meta);

        if (scroll) {
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }
    }

    async function sendMessage() {
        const input = document.getElementById('messageInput');
        const plaintext = input.value.trim();

        if (!plaintext || !selectedUser || !isConnected) return;

        try {
            // Encrypt the message before sending
            const { encryptedMessage, encryptedKey, encryptedKeySender } = await encryptMessage(plaintext, selectedUser);

            // Send encrypted payload via WebSocket
            const payload = {
                senderId: currentUser,
                receiverId: selectedUser,
                encryptedMessage: encryptedMessage,
                encryptedKey: encryptedKey,
                encryptedKeySender: encryptedKeySender
            };

            stompClient.send('/app/sendMessage', {}, JSON.stringify(payload));
            input.value = '';
        } catch (error) {
            console.error('Failed to encrypt/send message:', error);
            alert('Failed to send encrypted message. Please try again.');
        }
    }

    async function logout() {
        try {
            await fetch('/api/auth/logout', {
                method: 'POST',
                headers: { 'Authorization': 'Bearer ' + token }
            });
        } catch (error) {
            console.error('Logout error:', error);
        }

        if (stompClient) stompClient.disconnect();

        // Clear all local data including keys
        localStorage.removeItem('token');
        localStorage.removeItem('username');
        localStorage.removeItem('privateKey');
        localStorage.removeItem('publicKey');
        localStorage.removeItem('e2ee_user');

        window.location.href = '/login';
    }

    document.getElementById('messageInput').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') sendMessage();
    });

    // Initialize
    (async function init() {
        if (await checkAuth()) {
            connect();
        }
    })();
    </script>
